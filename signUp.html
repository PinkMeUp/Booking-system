<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PinkMeUp Beauty Spa — Create Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Icons/nails2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(6px);
            opacity: 0.75;
            z-index: -1;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #fff;
            padding: 45px 35px;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin: 20px auto;
            position: relative;
        }

        header {
            text-align: center;
        }

        .logo {
            color: #d6336c;
            font-size: 24px;
            font-weight: 700;
        }

        .tagline {
            font-size: 10px;
            color: #b08994;
            letter-spacing: 2px;
            margin: 8px 0 30px;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #f1f1f1;
            background: #fafafa;
            margin-bottom: 18px;
            font-size: 14px;
            width: 100%;
        }

        input::placeholder {
            color: #bbb;
        }

        input:focus {
            border: 1px solid #d6336c;
            background: #fff;
            outline: none;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 25px;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .options a {
            text-decoration: none;
            color: #d6336c;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(to right, #e64980, #c2255c);
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(214, 51, 108, 0.3);
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .signup {
            margin-top: 18px;
            font-size: 13px;
            text-align: center;
            color: #777;
        }

        .signup a {
            color: #d6336c;
            font-weight: 600;
            text-decoration: none;
        }

        /* Success message styling */
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            border-left: 4px solid #28a745;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
                margin: 15px auto;
            }
            body {
                padding: 15px;
            }
            .logo {
                font-size: 20px;
            }
            h2 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<main class="container">
    <section class="login-card">
        <header>
            <h1 class="logo">PinkMeUp Beauty Spa</h1>
            <p class="tagline">RADIANCE • BALANCE • JOY</p>
        </header>

        <h2>Create an account</h2>

        <!-- Success message area (hidden by default) -->
        <div id="messageArea" style="display: none;" class="success-message"></div>

        <form id="signupForm">
            <label>Full name</label>
            <input type="text" id="fullName" required>

            <label>Email address</label>
            <input type="email" id="email" placeholder="hello@example.com" required>

            <label>Password</label>
            <input type="password" id="password" required>

            <label>Confirm password</label>
            <input type="password" id="confirmPassword" required>

            <section class="options">
                <label class="remember">
                    <input type="checkbox" id="termsCheckbox"> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </section>

            <button type="submit">Register</button>

            <p class="signup">
                Already registered? <a href="login.html">Sign in</a>
            </p>
        </form>
    </section>
</main>

<script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('termsCheckbox').checked;

        if (password !== confirm) {
            alert("Password confirmation does not match. Please verify and try again.");
            return;
        }
        if (!terms) {
            alert("You must accept the Terms of Service and Privacy Policy to proceed.");
            return;
        }

        // Show success message 
        const messageDiv = document.getElementById('messageArea');
        messageDiv.textContent = "Your account has been created successfully. Redirecting to dashboard...";
        messageDiv.style.display = "block";

        // Disable submit button to prevent double submission
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.6";
        submitBtn.style.cursor = "not-allowed";

        // Redirect after 1.5 seconds
        setTimeout(function() {
            window.location.href = "prototype/dashboard.html";
        }, 1500);
    });
</script>

</body>
</html>
